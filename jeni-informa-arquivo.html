<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arquivo Editorial | JENI Informa</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="assets/css/informa.css" />
</head>
<body class="informa-premium">
<header class="site-header"><div class="container header-wrap"><a href="index.html" class="brand"><img src="logo-jeni.png" class="brand-logo" alt="JENI"></a><nav class="site-nav"><a href="jeni-informa.html">JENI Informa</a><a href="jeni-informa-arquivo.html" aria-current="page">Arquivo</a></nav></div></header>
<main class="archive-main container">
  <section class="archive-hero"><p class="section-tag">Arquivo Editorial</p><h1>Conteúdos publicados no JENI Informa</h1></section>
  <section class="archive-toolbar">
    <div class="archive-search-row">
      <input id="searchInput" type="search" placeholder="Pesquisar por título, tema ou autor" />
      <select id="typeSelect"><option value="">Todos os formatos</option></select>
    </div>
    <div class="archive-filter-row" id="chips">
      <button class="archive-filter-chip active" data-filter="all">Todos</button>
    </div>
  </section>
  <section class="archive-grid" id="archiveGrid"></section>
  <section id="archiveEmpty" class="archive-empty" hidden><p>Ainda não há conteúdos publicados.</p></section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="assets/js/public/informa-dynamic.js"></script>

</body>
</html>
