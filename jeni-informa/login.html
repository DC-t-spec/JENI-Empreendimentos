<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar | JENI Informa</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <header class="producer-header">
    <div class="dashboard-header-wrap">
      <a href="../jeni-informa.html" class="producer-back-link">← Voltar ao JENI Informa</a>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-card form-panel">
      <div class="producer-hero-mini">
        <p class="auth-intro" style="margin-bottom: 10px; font-weight: 700; color: #b68d49;">
          Área do Produtor
        </p>

        <h1>Entrar</h1>

        <p class="auth-intro">
          Aceda à sua conta para submeter, acompanhar e gerir conteúdos no
          <strong>JENI Informa</strong>.
        </p>
      </div>

      <form id="login-form" class="auth-form">
        <div class="auth-field">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="seuemail@exemplo.com" />
        </div>

        <div class="auth-field">
          <label for="password">Palavra-passe</label>
          <input type="password" id="password" required placeholder="Introduza a sua palavra-passe" />
        </div>

        <div id="login-message" class="auth-message"></div>

        <button type="submit" class="auth-btn">Entrar</button>
      </form>

      <div class="auth-link-row">
        Ainda não tem conta? <a href="criar-conta.html">Criar conta</a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", handleLogin);
  </script>
</body>
</html>
